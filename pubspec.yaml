name: tasker
description: "A full-featured todo list app with Flutter + Hive CE + BLoC."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.3.4
  get_it: ^8.0.3
  freezed_annotation: ^3.0.0
  go_router: ^15.1.2
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  flutter_slidable: ^4.0.0
  timezone: ^0.10.0
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.0.0
  build_runner: ^2.4.14
  hive_ce_generator: ^1.8.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
